<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Agile | The AI-Native Framework v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #09090b; 
            color: #fafafa;
            line-height: 1.8;
        }
        .gradient-border {
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .gradient-border:hover {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.05);
        }
        .text-step {
            background: linear-gradient(to bottom right, #fff 40%, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: -0.03em; color: #3b82f6; }
        h3 { font-size: 1.6rem; font-weight: 700; color: #fff; margin-top: 2.5rem; margin-bottom: 1.2rem; }
        h4 { font-size: 1.1rem; font-weight: 700; color: #3b82f6; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .rag-box {
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.1), rgba(37, 99, 235, 0.03));
            border-left: 4px solid #3b82f6;
            border-radius: 0.75rem;
            padding: 2.5rem;
            margin: 3rem 0;
        }
        .sprint-manifesto {
            background: #fff;
            color: #000;
            padding: 4rem 2rem;
            border-radius: 2rem;
            font-weight: 800;
            text-align: center;
            font-size: 1.8rem;
            line-height: 1.3;
            margin: 5rem 0;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.3);
        }
        p { margin-bottom: 1.8rem; color: #a1a1aa; font-size: 1.05rem; }
        li { margin-bottom: 1rem; color: #a1a1aa; }
        strong { color: #fff; font-weight: 600; }
        .footer-line { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 4rem; margin-top: 6rem; }
    </style>
</head>
<body class="antialiased tracking-tight">

    <nav class="p-8 max-w-7xl mx-auto flex justify-between items-center opacity-60">
        <div class="text-xl font-bold tracking-tighter uppercase italic">K-Agile<span class="text-blue-500">.</span></div>
        <div class="text-[10px] font-mono tracking-widest uppercase">Tuesday, March 24, 2026 / Official v1.0</div>
    </nav>
